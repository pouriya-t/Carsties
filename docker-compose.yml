services:
  postgres:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=postgrespw
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postresql/data

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
# System: PostgreSQL
# Server: postgres
# Username: postgres
# Password: postgrespw
# Database:     
        
volumes:
  pgdata: